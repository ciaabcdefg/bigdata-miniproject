# Root logger
rootLogger.level = INFO
rootLogger.appenderRef.stdout.ref = console
rootLogger.appenderRef.file.ref = file

# ── Console Appender (structured) ──────────────────────────────────────
appender.console.type = Console
appender.console.name = console
appender.console.target = SYSTEM_OUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n

# ── File Appender (rolling) ────────────────────────────────────────────
appender.file.type = RollingFile
appender.file.name = file
appender.file.fileName = /opt/spark/logs/spark-master.log
appender.file.filePattern = /opt/spark/logs/spark-master-%d{yyyy-MM-dd}-%i.log.gz
appender.file.layout.type = PatternLayout
appender.file.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n
appender.file.policies.type = Policies
appender.file.policies.time.type = TimeBasedTriggeringPolicy
appender.file.policies.time.interval = 1
appender.file.policies.size.type = SizeBasedTriggeringPolicy
appender.file.policies.size.size = 50MB
appender.file.strategy.type = DefaultRolloverStrategy
appender.file.strategy.max = 7

# ── Spark internals ───────────────────────────────────────────────────
logger.spark.name = org.apache.spark
logger.spark.level = INFO

logger.spark_deploy.name = org.apache.spark.deploy
logger.spark_deploy.level = INFO

logger.spark_executor.name = org.apache.spark.executor
logger.spark_executor.level = INFO

logger.spark_scheduler.name = org.apache.spark.scheduler
logger.spark_scheduler.level = INFO

logger.spark_storage.name = org.apache.spark.storage
logger.spark_storage.level = WARN

# ── Kafka connector ──────────────────────────────────────────────────
logger.kafka.name = org.apache.kafka
logger.kafka.level = WARN

# ── Elasticsearch connector ──────────────────────────────────────────
logger.es.name = org.elasticsearch
logger.es.level = INFO

# ── Jetty (Spark UI web server) ──────────────────────────────────────
logger.jetty.name = org.sparkproject.jetty
logger.jetty.level = WARN

# ── Hadoop ───────────────────────────────────────────────────────────
logger.hadoop.name = org.apache.hadoop
logger.hadoop.level = WARN
